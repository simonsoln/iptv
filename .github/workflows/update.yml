name: CCTV 自动更新

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行
  workflow_dispatch:       # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # 强制所有 Action 使用 Node.js 24，避免 Node.js 20 废弃警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ 检出仓库
      - name: Checkout 仓库
        uses: actions/checkout@v6

      # 2️⃣ 安装 Python（升级到支持 Node.js 24 的版本）
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ 安装 Python 依赖
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 4️⃣ 安装 FFmpeg
      - name: 安装 FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5️⃣ 运行 IPTV-API
      - name: 运行 IPTV-API
        run: python main.py

      # 6️⃣ 提交生成的 M3U 文件
      - name: 提交并推送结果
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add output/
          git commit -m "CCTV 自动更新" || echo "没有更新"
          git push
