name: IPTV-API 更新

on:
  schedule:
    - cron: '0 */6 * * *'     # 每6小时运行一次
  workflow_dispatch:         # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout 代码
        uses: actions/checkout@v6

      # 2. 安装 Python 环境
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 3. 安装依赖
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 4. 安装 FFmpeg
      - name: 安装 FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5. 运行 IPTV-API 更新脚本
      - name: 运行 IPTV-API
        run: python main.py

      # 6. 提交并推送结果
      - name: 提交结果
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add output/
          git commit -m "自动更新 IPTV-API 源"
          git push
