name: CCTV 稳定版更新

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行
  workflow_dispatch:

# ---- 在最外层设置 Node.js 24 强制选项 ----
defaults:
  run:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出代码
      - name: Checkout 仓库
        uses: actions/checkout@v6

      # 2️⃣ 安装 Python
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ 安装 Python 依赖
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 4️⃣ 安装 ffmpeg
      - name: 安装 FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5️⃣ 运行 IPTV-API
      - name: 运行 IPTV-API
        run: python main.py

      # 6️⃣ 提交并推送生成的 M3U 文件
      - name: 提交并推送结果
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add output/
          git commit -m "CCTV 自动更新"
          git push
