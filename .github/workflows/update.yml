name: CCTV 自动更新

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出仓库
      - uses: actions/checkout@v6

      # 2️⃣ 安装 Python（直接使用系统自带，不依赖 setup-python）
      - name: 安装 Python
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip

      # 3️⃣ 安装依赖
      - name: 安装依赖
        run: pip3 install -r requirements.txt

      # 4️⃣ 安装 FFmpeg
      - name: 安装 FFmpeg
        run: sudo apt-get install -y ffmpeg

      # 5️⃣ 运行 IPTV-API
      - name: 运行 IPTV-API
        run: python3 main.py

      # 6️⃣ 提交生成的 M3U
      - name: 提交并推送结果
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add output/
          git commit -m "CCTV 自动更新" || echo "没有更新"
          git push
