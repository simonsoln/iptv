name: IPTV-API 自动更新

# 触发条件：每天运行一次（UTC时间），以及手动触发
on:
  schedule:
    - cron: '0 0 * * *'  # 每天0点运行一次，UTC时间
  workflow_dispatch:     # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout 仓库
        uses: actions/checkout@v6
        with:
          persist-credentials: true  # 保持 GITHUB_TOKEN 用于 push

      # 2. 安装 Python
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安装 Python 依赖
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 4. 安装 FFmpeg
      - name: 安装 FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5. 运行 IPTV-API 生成 M3U 输出
      - name: 运行 IPTV-API
        run: python main.py

      # 6. 提交并推送生成的输出文件
      - name: 提交并推送结果
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add output/
          git commit -m "自动更新 IPTV-API 输出"
          git push
